esphome:
  name: advance-p4-7-inch
  friendly_name: Advance-P4-7-inch
  on_boot:
    priority: 800
    then:
      - logger.log: "Backlight ON"
      - output.turn_on: backlight_pwm
      - delay: 200ms
      - output.turn_off: power_light
      - delay: 500ms
  
      - light.turn_on:
          id: back_light
          brightness: 1

esp32:
  variant: esp32p4
  engineering_sample: true  
  cpu_frequency: 360MHZ
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V
  - channel: 4
    voltage: 2.5V

# Enable logging
logger:
  level: debug
  logs:
    lvgl: info
  hardware_uart: UART0

# Enable Home Assistant API
api:
  encryption:
    key: "Dp4Wgl1jj5F++6mnzSma7lHvgHCGfghlE/ohT96S+jw="

ota:
  - platform: esphome
    password: "bf1c7324cdcd0f41044c7722cbf5a048"

esp32_hosted:
  variant: esp32c6
  active_high: true
  reset_pin: GPIO32
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Advance-P4-7-Inch"
    password: "eW0iGlqyJxnC"

captive_portal:
  

i2c:
  - id: bus_a
    sda: GPIO45
    scl: GPIO46
    frequency: 400kHz

sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: "Room Temperature"
      id: room_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 1
    humidity:
      name: "Room Humidity"
      id: room_hum
      unit_of_measurement: "%"
      accuracy_decimals: 1
    update_interval: 1s

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    reset_pin: 40
    interrupt_pin: 42
    update_interval: 50ms
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false
    # Enabled Touch Logger here
    on_touch:
      - logger.log:
          format: "Touch at (%d, %d)"
          args: [touch.x, touch.y]
      - lambda: |-
          ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%d",
          touch.x,
          touch.y,
          touch.x_raw,
          touch.y_raw
          );

switch:
  - platform: gpio
    pin: GPIO48
    name: "LED"
    id: led_output
    on_turn_on:
      # Switch bulb diagram
      - lvgl.image.update:
          id: lvgl_light
          src: light_on
      # Switch the status label text to ON
      - lvgl.label.update:
          id: label_light_state
          text: "ON"
    on_turn_off:
      # Switch bulb diagram
      - lvgl.image.update:
          id: lvgl_light
          src: light_off
      # Switch the status label text to OFF
      - lvgl.label.update:
          id: label_light_state
          text: "OFF"

output:
  - platform: ledc
    pin: GPIO31
    id: backlight_pwm
  - platform: gpio
    id: power_light
    pin: GPIO29
    inverted: true
    
light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_pwm
    id: back_light
    restore_mode: ALWAYS_ON
    internal: true

display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    reset_pin:
      number: 41
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 1024
      height: 600
    color_order: RGB
    color_depth: 16

image:
  - file: "small_temp.png"
    id: small_temp
    resize: 200x200
    type: RGB565
    byte_order: little_endian
  - file: "small_hum.png"
    id: small_hum
    resize: 200x200
    type: RGB565
    byte_order: little_endian
  - file: "small_logo.png"
    id: small_logo
    resize: 200x100
    type: RGB565
    byte_order: little_endian
  - file: "light.png"
    id: light_on
    resize: 200x200
    type: RGB565
    transparency: alpha_channel
    byte_order: little_endian
  - file: "no_light.png"
    id: light_off
    resize: 200x200
    type: RGB565
    transparency: alpha_channel
    byte_order: little_endian

lvgl:
  buffer_size: 50%
  byte_order: little_endian
  color_depth: 16
  log_level: INFO
  bg_color: 0xFFFFFF
  text_font: montserrat_26
  widgets:  
    - image:
        id: lvgl_logo
        src: small_logo
        x: 400
        y: 20
    - image:
        id: lvgl_temp
        src: small_temp
        x: 250
        y: 250
    - image:
        id: lvgl_hum
        src: small_hum
        x: 500
        y: 250
    - image:
        id: lvgl_light
        src: light_off    # Default 'Turn off lights' image
        x: 750            # You can adjust the position by yourself
        y: 250
    - label:
        id: label_temp
        x: 190
        y: 350
        text: "Temp: --°C"
    - label:
        id: label_hum
        x: 450
        y: 350
        text: "Humi: --%"
    - label:
        id: label_light_state
        x: 750
        y: 350
        text: "OFF"

interval:
  - interval: 1s
    then:
      - lambda: |-
          char temp_str[20];
          char hum_str[20];
          snprintf(temp_str, sizeof(temp_str), "Temp: %.1f°C", id(room_temp).state);
          snprintf(hum_str, sizeof(hum_str), "Humi: %.1f%%", id(room_hum).state);
          lv_label_set_text(id(label_temp), temp_str);
          lv_label_set_text(id(label_hum), hum_str);
 